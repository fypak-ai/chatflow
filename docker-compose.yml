version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chatflow
      POSTGRES_PASSWORD: chatflow
      POSTGRES_DB: chatflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    env_file: .env
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000

  code-runner:
    build: ./code-runner
    ports:
      - '8001:8001'
    privileged: true

  github-bot:
    build: ./bots/github-webhook
    ports:
      - '8002:8002'
    env_file: .env
    depends_on:
      - backend

volumes:
  postgres_data:
